<!DOCTYPE html>
<html>
<head>
<style>
	body {
		background-color: skyblue;
		display: flex;
		align-items: center;
		justify-content: center;
		height: 100vh;
		margin: 0;
	}
	h1 {
		color: black;
		font-size: 67px;
		font-family: sans-serif;
	}
</style>
</head>
<body>
	<h1 id="display">Press "o" to start</h1>
	<script>
		const display = document.getElementById("display");
		let random_number = 0;
        let coins=0;
        if (coins >= 100) {
	            document.body.style.backgroundColor = "gold"; // unlocked at 100 coins!
            } else if (coins >= 50) {
	            document.body.style.backgroundColor = "orchid"; // unlocked at 50 coins!
            } else if (coins >= 20) {
	            document.body.style.backgroundColor = "lightgreen"; // unlocked at 20 coins!
            }
		document.addEventListener("keydown", (event) => {
			if (event.key == "o") {
				random_number = Math.floor(Math.random() * 10) + 1;
				coins += random_number*2;
				display.innerHTML = "lucky 7! coins earned: " + coins;
                // 1. Define the delay helper function (takes milliseconds)
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // 2. Use it inside an async function
                async function runProcess() {
                    console.log("Starting...");
  
                await delay(3000); // Waits exactly 3 seconds (3000ms)
  
                console.log("3 seconds later!");
}

                runProcess();
                const song = new Audio("https://www.youtube.com/watch?v=nuvVlkP6IRo");
                song.play();
            }else{
                coins+=random_number;
                display.innerHTML = "rolled " + random_number + " ! coins: " + coins;
                const song = new Audio("https://www.youtube.com/watch?v=Ij76x_px8jo");
            }    

        });
	</script>
</body>
</html>
