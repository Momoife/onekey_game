<!DOCTYPE html>
<html>
<head>
<style>
	body {
		background-color:  rgb(180, 102, 102)13;
		display: flex;
		align-items: center;
		justify-content: center;
		height: 100vh;
		margin: 0;
	}
	h1 {
		color: black;
		font-size: 67px;
		font-family: sans-serif;
	}
	@keyframes wobble{
   	0%{transform:rotate(-5deg);}
   	100%{transform:rotate(5deg);}
}
</style>
</head>
<body>
	<h1 id="display">Press "o" to start</h1>
	<script>
		const display = document.getElementById("display");
		let random_number = 0;
        let coins=0;
        
		document.addEventListener("keydown", (event) => {
			if (event.key == "o") {
				random_number = Math.floor(Math.random() * 10) + 1;
				new Audio("Jackpot Slot Machine Sounds Effect Casino - SFX (128k).mp3").play();
				if (random_number == 7) {
					coins += random_number * 2; // lucky! double coins
					display.innerHTML = "Lucky 7! 🪙: " + coins;
				} else if (random_number == 1) {
					coins == 0 ; // unlucky! lose coins
					display.innerHTML = "Unlucky 1! 🪙: " + coins;
				} else {
					coins += random_number;
					display.innerHTML = "Rolled " + random_number + "! 🪙: " + coins;
				}
			if (coins >= 100) {
	            document.body.style.backgroundColor = "red"; // unlocked at 100 coins!
				display.innerHTML += "<br>you've reached 100 coins!"; // encouragement message

            } else if (coins >= 50) {
	            document.body.style.backgroundColor = "orchid"; // unlocked at 50 coins!
				display.innerHTML += "<br>you've reached 50 coins!"; // encouragement message

            } else if (coins >= 20) {
	            document.body.style.backgroundColor = "yellow"; // unlocked at 20 coins!
				display.innerHTML += "<br>you've reached 20 coins!"; // encouragement message
			}
				}
		}
	);
	</script>
</body>
</html>
